<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="sd" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CFF"/>
      <stop offset="0.5" stop-color="#5C7CFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Diffusion monogram: a crisp signal (left) denoising into a dispersed
       field of particles (right) — the diffusion process as a minimal mark. -->
  <path d="M14 32 C 22 14, 42 14, 50 32 C 42 50, 22 50, 14 32 Z"
        stroke="url(#sd)" stroke-width="4.4" stroke-linecap="round" fill="none" opacity="0.32"/>
  <path d="M16 40 C 24 28, 40 36, 48 24"
        stroke="url(#sd)" stroke-width="4.6" stroke-linecap="round" fill="none"/>
  <!-- signal point -->
  <circle cx="16" cy="40" r="3.6" fill="#8B5CFF"/>
  <!-- diffused particles, fading out -->
  <circle cx="48" cy="24" r="3.2" fill="#22D3EE"/>
  <circle cx="40" cy="16" r="2.1" fill="#22D3EE" opacity="0.75"/>
  <circle cx="52" cy="38" r="1.8" fill="#5C7CFF" opacity="0.6"/>
  <circle cx="33" cy="13" r="1.4" fill="#22D3EE" opacity="0.5"/>
  <circle cx="55" cy="14" r="1.2" fill="#22D3EE" opacity="0.4"/>
</svg>
