<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300" fill="none" role="img" aria-label="use_diffusers: one tool, every modality">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CFF"/>
      <stop offset="0.5" stop-color="#5C7CFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CFF"/>
      <stop offset="0.5" stop-color="#5C7CFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <style>
    .lbl{font:600 13px -apple-system,BlinkMacSystemFont,system-ui,sans-serif;fill:#86868b}
    .mono{font:600 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#86868b}
    .cap{font:700 14px -apple-system,system-ui,sans-serif}
    .pulse{transform-origin:280px 150px;animation:hp 3s ease-in-out infinite}
    @keyframes hp{0%,100%{opacity:.85}50%{opacity:1;transform:scale(1.04)}}
    @media (prefers-reduced-motion: reduce){
      * { animation: none !important; }
      .ron { opacity: 1 !important; }
      .roff { opacity: .25 !important; }
    }
  </style>
  <path id="il0" d="M120 50 C 190 50, 200 150, 232 150" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="il1" d="M120 117 C 190 117, 200 150, 232 150" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="il2" d="M120 183 C 190 183, 200 150, 232 150" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="il3" d="M120 250 C 190 250, 200 150, 232 150" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="ol0" d="M328 150 C 360 150, 370 50, 440 50" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="ol1" d="M328 150 C 360 150, 370 100, 440 100" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="ol2" d="M328 150 C 360 150, 370 150, 440 150" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="ol3" d="M328 150 C 360 150, 370 200, 440 200" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/><path id="ol4" d="M328 150 C 360 150, 370 250, 440 250" stroke="#3a3a3e" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="0.0s" repeatCount="indefinite" path="M120 50 C 190 50, 200 150, 232 150"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="0.3s" repeatCount="indefinite" path="M120 117 C 190 117, 200 150, 232 150"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="0.6s" repeatCount="indefinite" path="M120 183 C 190 183, 200 150, 232 150"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="0.9s" repeatCount="indefinite" path="M120 250 C 190 250, 200 150, 232 150"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="1.0s" repeatCount="indefinite" path="M328 150 C 360 150, 370 50, 440 50"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="1.3s" repeatCount="indefinite" path="M328 150 C 360 150, 370 100, 440 100"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite" path="M328 150 C 360 150, 370 150, 440 150"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="1.9s" repeatCount="indefinite" path="M328 150 C 360 150, 370 200, 440 200"/></circle><circle r="3" fill="url(#gh)"><animateMotion dur="2.4s" begin="2.2s" repeatCount="indefinite" path="M328 150 C 360 150, 370 250, 440 250"/></circle>
  <text class="mono" x="112" y="54" text-anchor="end">text</text><text class="mono" x="112" y="121" text-anchor="end">image</text><text class="mono" x="112" y="187" text-anchor="end">video</text><text class="mono" x="112" y="254" text-anchor="end">robot state</text><text class="mono" x="448" y="54" text-anchor="start">image</text><text class="mono" x="448" y="104" text-anchor="start">video</text><text class="mono" x="448" y="154" text-anchor="start">audio</text><text class="mono" x="448" y="204" text-anchor="start">actions</text><text class="mono" x="448" y="254" text-anchor="start">3D</text>
  <g class="pulse">
    <rect x="232" y="124" width="96" height="52" rx="16"
          fill="rgba(124,92,255,0.10)" stroke="url(#gh)" stroke-width="2"/>
  </g>
  <text class="cap" x="280" y="148" text-anchor="middle" fill="url(#gh)">use_</text>
  <text class="cap" x="280" y="166" text-anchor="middle" fill="url(#gh)">diffusers</text>
  <text class="lbl" x="280" y="40" text-anchor="middle">one tool</text>
  <text class="lbl" x="120" y="280" text-anchor="middle">inputs</text>
  <text class="lbl" x="440" y="280" text-anchor="middle">outputs</text>
</svg>
